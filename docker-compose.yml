services:
  app:
    build:
      context: ${AIVIDEOTRANS_APP_BUILD_CONTEXT:-.}
      dockerfile: Dockerfile
      args:
        # Phase D — opt into Whisper subtitle alignment runtime deps at
        # image build time. Default 0 (no faster-whisper installed).
        # Deployments that flip this to 1 must ALSO mount the
        # model_cache volume below + set HF_HOME so model downloads
        # survive container recreation.
        INSTALL_WHISPER: "${INSTALL_WHISPER:-0}"
    image: ${APP_IMAGE_NAME:-aivideotrans-app:linux-baseline}
    container_name: ${APP_CONTAINER_NAME:-aivideotrans-app}
    network_mode: host
    restart: unless-stopped
    env_file:
      - /opt/aivideotrans/config/.env
    environment:
      AIVIDEOTRANS_CONFIG_DIR: /opt/aivideotrans/config
      AIVIDEOTRANS_JOBS_DIR: /opt/aivideotrans/app/jobs
      AIVIDEOTRANS_PROJECTS_DIR: /opt/aivideotrans/app/projects
      AIVIDEOTRANS_RUNTIME_LOGS_DIR: /opt/aivideotrans/data/runtime_logs
      # Phase D — Whisper model cache target. Bind-mounted below so
      # pre-warmed weights persist across rebuilds. Container default
      # was /root/.cache/huggingface (ephemeral writable layer).
      HF_HOME: /opt/aivideotrans/model_cache/hf
      ASSEMBLYAI_API_KEY: ${ASSEMBLYAI_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      VERTEX_AI_EXPRESS_KEY: ${VERTEX_AI_EXPRESS_KEY:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      AUTODUB_TTS_API_KEY: ${AUTODUB_TTS_API_KEY:-}
      # T4 — shared-secret for /api/internal/* (app↔gateway loopback).
      # Must be set (32+ chars). Gateway refuses to start without it; the app
      # needs the same value to pass X-Internal-Key when calling gateway.
      AVT_INTERNAL_API_KEY: ${AVT_INTERNAL_API_KEY:?AVT_INTERNAL_API_KEY 必须在 .env 中设置 (32+ chars)}
      # Vertex AI (Gemini) — service account auth
      GOOGLE_APPLICATION_CREDENTIALS: "/opt/aivideotrans/config/gcp-service-account.json"
      GOOGLE_CLOUD_PROJECT: "${GOOGLE_CLOUD_PROJECT:-gen-lang-client-0200199358}"
      GOOGLE_CLOUD_LOCATION: "${GOOGLE_CLOUD_LOCATION:-global}"
      # P2-17a-1 alignment thread pool. Listed explicitly (even at default)
      # so ops has one source of truth: a 32 here would clamp to 4 (cap),
      # invalid values fall back to 1 (serial). Setting to 1 is the
      # rollback path — dispatches to _align_all_serial verbatim.
      AVT_ALIGN_MAX_WORKERS: "${AVT_ALIGN_MAX_WORKERS:-2}"
      # P2-17a-1 paid fallback semaphore concurrency. Default 1 is a
      # CORRECTNESS constraint, not cost-conservatism — see
      # docs/audits/2026-05-08-tts-rewriter-translator-state-audit.md.
      # Raising above 1 requires upgrading 4 mutable shared fields on
      # TTSGenerator + GeminiTranslator; do NOT just bump the env.
      AVT_ALIGN_PAID_FALLBACK_MAX_CONCURRENCY: "${AVT_ALIGN_PAID_FALLBACK_MAX_CONCURRENCY:-1}"
    volumes:
      # --- 开发期代码热更新 bind mount ---
      # 主机代码目录直接映射到容器内，修改后 docker restart 即可生效。
      # ⚠️ 项目接近完成时切回镜像不可变模式：删除下面 3 个 code mount，
      #    改为 docker-compose build app + docker-compose up -d app。
      #    参见 docs/FREE_VS_PAID_TTS_ROUTING_STATUS_AND_RECOVERY_PLAN.md
      - type: bind
        source: ${AIVIDEOTRANS_ROOT}/app/src
        target: /opt/aivideotrans/app/src
      - type: bind
        source: ${AIVIDEOTRANS_ROOT}/app/main.py
        target: /opt/aivideotrans/app/main.py
      - type: bind
        source: ${AIVIDEOTRANS_ROOT}/app/scripts
        target: /opt/aivideotrans/app/scripts
      # --- 数据持久化 bind mount（始终保留） ---
      - type: bind
        source: ${AIVIDEOTRANS_ROOT}/config
        target: /opt/aivideotrans/config
      - type: bind
        source: ${AIVIDEOTRANS_ROOT}/data/projects
        target: /opt/aivideotrans/app/projects
      - type: bind
        source: ${AIVIDEOTRANS_ROOT}/data/jobs
        target: /opt/aivideotrans/app/jobs
      - type: bind
        source: ${AIVIDEOTRANS_ROOT}/data/runtime_logs
        target: /opt/aivideotrans/data/runtime_logs
      # Phase D — persistent Whisper / HF model cache. Survives container
      # rebuild so we don't re-download ~466 MB ``small`` weights on every
      # ``docker compose build app``. HF_HOME is set above to point here.
      # Created lazily by host preflight (or manual mkdir) — empty on
      # fresh install means first whisper subprocess will populate it.
      - type: bind
        source: ${AIVIDEOTRANS_ROOT}/data/model_cache
        target: /opt/aivideotrans/model_cache
    healthcheck:
      test: ["CMD", "python", "scripts/linux_remote_workbench_preflight.py", "app-health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  postgres:
    image: postgres:16-alpine
    container_name: aivideotrans-postgres
    restart: unless-stopped
    # Phase 1.5 硬化（2026-04-22）：只监听 loopback。network_mode: host 下
    # 容器内的 127.0.0.1 和宿主 127.0.0.1 是同一个，app/gateway 从容器里连
    # localhost:5432 依然可达。覆盖 IPv4+IPv6 loopback 两个，因为 uvicorn /
    # next 默认都可能用 ::1 连本地。若 ufw 失效，公网也无法从外部接入 pg。
    command: ["postgres", "-c", "listen_addresses=127.0.0.1,::1"]
    environment:
      POSTGRES_DB: aivideotrans
      POSTGRES_USER: avt
      POSTGRES_PASSWORD: ${PG_PASSWORD:?PG_PASSWORD 必须在 .env 中设置}
    network_mode: host
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U avt -d aivideotrans"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  next:
    build:
      context: ${AIVIDEOTRANS_NEXT_BUILD_CONTEXT:-./frontend-next}
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_CAPTCHA_PROVIDER: "${NEXT_PUBLIC_CAPTCHA_PROVIDER:-fake}"
        NEXT_PUBLIC_TURNSTILE_SITE_KEY: "${NEXT_PUBLIC_TURNSTILE_SITE_KEY:-}"
        NEXT_PUBLIC_GEETEST_REGISTER_CAPTCHA_ID: "${NEXT_PUBLIC_GEETEST_REGISTER_CAPTCHA_ID:-}"
        NEXT_PUBLIC_GEETEST_LOGIN_CAPTCHA_ID: "${NEXT_PUBLIC_GEETEST_LOGIN_CAPTCHA_ID:-}"
        NEXT_PUBLIC_ENABLE_POST_EDIT: "${NEXT_PUBLIC_ENABLE_POST_EDIT:-0}"
        NEXT_PUBLIC_ENABLE_FREE_TIER: "${NEXT_PUBLIC_ENABLE_FREE_TIER:-0}"
        # GEO canonical origin — inlined into the standalone bundle at build
        # time so client-side imports of `lib/seo/site.ts` see the real URL.
        # Also set as a runtime env below for server-component reads. Must
        # match gateway SITE_URL or canonical / OG / sitemap will diverge
        # from email-link host. See plans/2026-05-03-geo-optimization-plan.md.
        NEXT_PUBLIC_SITE_URL: "${NEXT_PUBLIC_SITE_URL:-https://aitrans.video}"
    image: aivideotrans-next:latest
    container_name: aivideotrans-next
    network_mode: host
    restart: unless-stopped
    environment:
      PORT: "3000"
      NEXT_PUBLIC_CAPTCHA_PROVIDER: "${NEXT_PUBLIC_CAPTCHA_PROVIDER:-fake}"
      NEXT_PUBLIC_TURNSTILE_SITE_KEY: "${NEXT_PUBLIC_TURNSTILE_SITE_KEY:-}"
      NEXT_PUBLIC_GEETEST_REGISTER_CAPTCHA_ID: "${NEXT_PUBLIC_GEETEST_REGISTER_CAPTCHA_ID:-}"
      NEXT_PUBLIC_GEETEST_LOGIN_CAPTCHA_ID: "${NEXT_PUBLIC_GEETEST_LOGIN_CAPTCHA_ID:-}"
      # Phase 1.5 硬化（2026-04-22）：Next standalone 只监听 loopback。
      # Caddy 从 127.0.0.1:3000 反代，network_mode: host 下容器内 = 宿主
      # loopback。ufw 失效时公网依然 refused。
      HOSTNAME: "127.0.0.1"
      # Mirror the build arg for SSR runtime reads (sitemap.ts / robots.ts
      # generate at request time, not build time).
      NEXT_PUBLIC_SITE_URL: "${NEXT_PUBLIC_SITE_URL:-https://aitrans.video}"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:3000/healthz.txt"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

  gateway:
    build:
      context: ${AIVIDEOTRANS_GATEWAY_BUILD_CONTEXT:-./gateway}
      dockerfile: Dockerfile
    image: aivideotrans-gateway:latest
    container_name: aivideotrans-gateway
    network_mode: host
    restart: unless-stopped
    # 启动入口由 gateway/Dockerfile 的 `CMD ["python","main.py"]` 负责，
    # main.py:320 读 settings.gateway_host / gateway_port（由下方
    # environment.AVT_GATEWAY_HOST / AVT_GATEWAY_PORT 提供）。
    # Phase 1.5 早期曾在这里放 `command:` 覆盖兜底，镜像修复后已移除。
    volumes:
      # Shared config directory (same as app — admin_settings.json, etc.)
      - type: bind
        source: ${AIVIDEOTRANS_ROOT}/config
        target: /opt/aivideotrans/config
      # Shared src/ tree (read-only) — gateway needs services.review_state,
      # services.voice_clone for clone path, services.llm_registry for model
      # metadata, services.transcript_reviewer / services.gemini.translator
      # for admin prompt UI.  Was a single-file mount of llm_registry.py
      # before; expanded to whole src/ to fix "ModuleNotFoundError:
      # services.review_state" during voice clone (2026-04-15).
      - type: bind
        source: ${AIVIDEOTRANS_ROOT}/app/src
        target: /opt/aivideotrans/app/src
        read_only: true
      # Project data — S2 monitor reads transcript artifacts (read-only)
      - type: bind
        source: ${AIVIDEOTRANS_ROOT}/data/projects
        target: /opt/aivideotrans/data/projects
        read_only: true
      # Same data, mounted at the app-container path so gateway code that
      # receives a project_dir from app (e.g. voice_selection_api during
      # voice clone) can use the path verbatim without translation.
      # Writable for clone path (writes speaker_audio/ + clone_sample.wav).
      - type: bind
        source: ${AIVIDEOTRANS_ROOT}/data/projects
        target: /opt/aivideotrans/app/projects
      # Phase 2 R2 download backend (plan 2026-04-23) needs jobs_dir to:
      #   (a) append download.* JSONL events that Job API already reads via
      #       JobStore.load_events (same on-disk schema), and
      #   (b) host the per-key upload lock files under
      #       {jobs_dir}/_r2_upload_locks/{sha256}/ so concurrent first-
      #       downloads of the same artifact don't race the R2 PUT.
      # Writable because the lock files need O_RDWR. Path deliberately
      # mirrors the app container's AIVIDEOTRANS_JOBS_DIR so both writers
      # land in the same file.
      - type: bind
        source: ${AIVIDEOTRANS_ROOT}/data/jobs
        target: /opt/aivideotrans/app/jobs
      # Caddy public access logs for admin traffic analytics (read-only).
      - type: bind
        source: ${AIVIDEOTRANS_ROOT}/data/runtime_logs
        target: /opt/aivideotrans/data/runtime_logs
        read_only: true
      # 2026-05-26 postmortem P0c. Pan backup tar staging directory.
      # MUST be a bind mount on the data partition rather than the
      # container overlay so multi-GB tar.gz builds during pan backups
      # do not fill the host root partition (the 2026-05-26 disk-full
      # incident vector). Empty path → executor falls back to /tmp =
      # container overlay = host root; configure AVT_PAN_TMP_DIR to
      # land here. Writable: tar is written and then unlinked. The
      # SSD partition sized for project data instead. AVT_PAN_TMP_DIR
      # env (also set on the gateway service environment) points here.
      - type: bind
        source: ${AIVIDEOTRANS_ROOT}/data/_pan_tmp
        target: /opt/aivideotrans/data/_pan_tmp
    depends_on:
      app:
        condition: service_healthy
      postgres:
        condition: service_healthy
      disk-resize-helper:
        condition: service_healthy
    env_file:
      # Shared with app — provides AUTODUB_TTS_API_KEY,
      # AUTODUB_TTS_CLONE_BASE_URL, AUTODUB_TTS_BASE_URL etc. that
      # voice_clone_for_selection needs for MiniMax voice clone API calls.
      - /opt/aivideotrans/config/.env
    environment:
      AVT_JOB_API_UPSTREAM: "http://127.0.0.1:8877"
      # Phase 1.5 硬化（2026-04-22）：Gateway uvicorn 只监听 loopback。
      # 所有入站（Caddy / internal loopback / cloudflared 经 Caddy）都走
      # 127.0.0.1:8880。ufw 失效时公网依然 refused。
      AVT_GATEWAY_HOST: "127.0.0.1"
      AVT_GATEWAY_PORT: "8880"
      AIVIDEOTRANS_RUNTIME_LOGS_DIR: "/opt/aivideotrans/data/runtime_logs"
      AVT_ADMIN_DISK_RESIZE_ENABLED: "${AVT_ADMIN_DISK_RESIZE_ENABLED:-false}"
      AVT_ADMIN_DISK_RESIZE_DEVICE: "${AVT_ADMIN_DISK_RESIZE_DEVICE:-/dev/sdb}"
      AVT_ADMIN_DISK_RESIZE_HELPER_URL: "http://127.0.0.1:8891"
      AVT_ADMIN_DISK_RESIZE_HELPER_TOKEN: "${AVT_ADMIN_DISK_RESIZE_HELPER_TOKEN:-}"
      AVT_AUTH_REQUIRED: "true"
      # GEO canonical origin — used by gateway/notifications.py to build
      # email links to /workspace/{job_id}. MUST equal frontend
      # NEXT_PUBLIC_SITE_URL (set on the `next` service) so email recipients
      # land on the same canonical host that sitemap / canonical / OG point
      # at. Single override in .env propagates to both. See
      # docs/plans/2026-05-03-geo-optimization-plan.md §6.4.
      SITE_URL: "${SITE_URL:-https://aitrans.video}"
      # CSRF origin guard should use SITE_URL / AVT_CORS_ORIGINS in production.
      # Only enable this when the Gateway is exclusively behind a proxy that
      # overwrites X-Forwarded-Host.
      AVT_CSRF_TRUST_FORWARDED_HOST: "${AVT_CSRF_TRUST_FORWARDED_HOST:-false}"
      # T6 — default to production so the validate_production_safety startup
      # guard fires by default. Local dev sets `AVT_ENV=dev` in their own
      # .env to override (safe: the guard only refuses auth-disabled prod).
      # This manifest is the production deploy source of truth; relying on
      # operators to remember to set AVT_ENV in the external .env would
      # silently disable the guard.
      AVT_ENV: "${AVT_ENV:-production}"
      AVT_PG_PASSWORD: "${PG_PASSWORD:?PG_PASSWORD 必须在 .env 中设置}"
      AVT_DATABASE_URL: ""
      # T4 — shared-secret for /api/internal/* (app↔gateway loopback).
      # Must be set (32+ chars). Gateway startup refuses to run without it.
      AVT_INTERNAL_API_KEY: "${AVT_INTERNAL_API_KEY:?AVT_INTERNAL_API_KEY 必须在 .env 中设置 (32+ chars)}"
      # --- AI Analysis (GPT-5.4 thinking) ---
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      # --- Captcha (Cloudflare Turnstile) ---
      AVT_CAPTCHA_PROVIDER: "${AVT_CAPTCHA_PROVIDER:-fake}"
      AVT_TURNSTILE_SECRET_KEY: "${AVT_TURNSTILE_SECRET_KEY:-}"
      # --- Captcha (GeeTest CAPTCHA v4) ---
      AVT_GEETEST_API_SERVER: "${AVT_GEETEST_API_SERVER:-http://gcaptcha4.geetest.com}"
      AVT_GEETEST_REGISTER_CAPTCHA_ID: "${AVT_GEETEST_REGISTER_CAPTCHA_ID:-}"
      AVT_GEETEST_REGISTER_CAPTCHA_KEY: "${AVT_GEETEST_REGISTER_CAPTCHA_KEY:-}"
      AVT_GEETEST_LOGIN_CAPTCHA_ID: "${AVT_GEETEST_LOGIN_CAPTCHA_ID:-}"
      AVT_GEETEST_LOGIN_CAPTCHA_KEY: "${AVT_GEETEST_LOGIN_CAPTCHA_KEY:-}"
      # --- Aliyun SMS credentials (shared with FC relay) ---
      AVT_ALIYUN_SMS_ACCESS_KEY_ID: "${AVT_ALIYUN_SMS_ACCESS_KEY_ID:-}"
      AVT_ALIYUN_SMS_ACCESS_KEY_SECRET: "${AVT_ALIYUN_SMS_ACCESS_KEY_SECRET:-}"
      # --- SMS (Aliyun) ---
      AVT_SMS_PROVIDER: "${AVT_SMS_PROVIDER:-fake}"
      AVT_ALIYUN_SMS_RELAY_URL: "${AVT_ALIYUN_SMS_RELAY_URL:-}"
      AVT_ALIYUN_SMS_RELAY_USER: "${AVT_ALIYUN_SMS_RELAY_USER:-}"
      AVT_ALIYUN_SMS_RELAY_PASS: "${AVT_ALIYUN_SMS_RELAY_PASS:-}"
      # VolcEngine TTS credentials — needed for voice catalog verify
      VOLCENGINE_TTS_APP_ID: "${VOLCENGINE_TTS_APP_ID:-}"
      VOLCENGINE_TTS_ACCESS_KEY: "${VOLCENGINE_TTS_ACCESS_KEY:-}"
      # Studio post-edit feature flag (D29) — gate editing endpoints
      AVT_ENABLE_POST_EDIT: "${AVT_ENABLE_POST_EDIT:-false}"
      # MiMo free-tier (Phase 2a) — gate service_mode="free" creation.
      # Default off; public launch also needs consent/legal (design §5.3).
      AVT_ENABLE_FREE_TIER: "${AVT_ENABLE_FREE_TIER:-false}"
      # Voice CPS auto-calibration after clone (plan v4.3 T1). Default ON;
      # set to "false"/"0"/"no"/"off" to disable. Each successful clone
      # fires 2 background tasks (turbo + hd) — the in-flight registry
      # de-dupes against any racing manual /calibrate-speed for the same
      # voice, and budget is rate-limited to 8/min × 30/day per user
      # (see risk_control._VOICE_CALIBRATION_*).
      AVT_AUTO_CALIBRATE_AFTER_CLONE: "${AVT_AUTO_CALIBRATE_AFTER_CLONE:-true}"
      # Voice CPS preflight on review submit (plan v4.3 T2). Default OFF —
      # operator must explicitly opt in. When true: /review/voice-selection/approve
      # will pre-calibrate the chosen voices' CPS for the job's final MiniMax
      # model BEFORE proxying to Job-API, with a hard 50s upper bound. Voices
      # not in user_voices/voice_catalog or non-MiniMax providers are skipped.
      # Pending tasks at 50s keep running in background (NOT cancelled).
      AVT_AUTO_CALIBRATE_ON_REVIEW_SUBMIT: "${AVT_AUTO_CALIBRATE_ON_REVIEW_SUBMIT:-false}"
      # --- Phase 4.1.x CosyVoice clone sample uploader ---
      # Default stays fail-closed: local_fs_stub is rejected by the clone
      # endpoint when worker clone is enabled. To run live clone smoke, set
      # AVT_COSYVOICE_SAMPLE_UPLOADER=aliyun_oss and populate all
      # AVT_COSYVOICE_OSS_* values below.
      AVT_COSYVOICE_SAMPLE_UPLOADER: "${AVT_COSYVOICE_SAMPLE_UPLOADER:-local_fs_stub}"
      AVT_COSYVOICE_OSS_ENDPOINT: "${AVT_COSYVOICE_OSS_ENDPOINT:-}"
      AVT_COSYVOICE_OSS_BUCKET: "${AVT_COSYVOICE_OSS_BUCKET:-}"
      AVT_COSYVOICE_OSS_ACCESS_KEY_ID: "${AVT_COSYVOICE_OSS_ACCESS_KEY_ID:-}"
      AVT_COSYVOICE_OSS_ACCESS_KEY_SECRET: "${AVT_COSYVOICE_OSS_ACCESS_KEY_SECRET:-}"
      AVT_COSYVOICE_OSS_REGION: "${AVT_COSYVOICE_OSS_REGION:-cn-beijing}"
      AVT_COSYVOICE_OSS_KEY_PREFIX: "${AVT_COSYVOICE_OSS_KEY_PREFIX:-cosyvoice/clone-samples}"
      AVT_COSYVOICE_OSS_CONNECT_TIMEOUT_S: "${AVT_COSYVOICE_OSS_CONNECT_TIMEOUT_S:-10}"
      AVT_COSYVOICE_OSS_READ_TIMEOUT_S: "${AVT_COSYVOICE_OSS_READ_TIMEOUT_S:-30}"
      # --- Phase 2 R2 download backend (plan 2026-04-23) ---
      # Default is intentionally safe: "local" keeps the existing Gateway
      # -> Job API byte-passthrough path. Flipping to "r2" requires ALL
      # three R2_* secrets to be populated; startup_checks.validate_r2_backend
      # logs CRITICAL and auto-downgrades to local if anything is missing.
      AVT_DOWNLOAD_REDIRECT_BACKEND: "${AVT_DOWNLOAD_REDIRECT_BACKEND:-local}"
      # Shared jobs directory — same path as app container so both writers
      # land in the same .events.jsonl files. Matches the volume bind below.
      AIVIDEOTRANS_JOBS_DIR: "/opt/aivideotrans/app/jobs"
      # R2 credentials. Env var names intentionally omit AVT_ prefix (matches
      # the upstream Cloudflare-R2 plan + scripts/phase0_probes/ convention).
      # All four default to empty — Phase 2 happily runs in "local" mode
      # with no R2 creds, so operators can opt in at rollout time.
      R2_ENDPOINT: "${R2_ENDPOINT:-}"
      R2_ACCESS_KEY_ID: "${R2_ACCESS_KEY_ID:-}"
      R2_SECRET_ACCESS_KEY: "${R2_SECRET_ACCESS_KEY:-}"
      R2_ARTIFACTS_BUCKET: "${R2_ARTIFACTS_BUCKET:-avt-artifacts}"
      # Presigned URL TTL (s). Short on purpose — browser follows the 302
      # immediately, so a leaked URL barely has a replay window.
      AVT_R2_PRESIGNED_EXPIRES_S: "${AVT_R2_PRESIGNED_EXPIRES_S:-120}"
      # Stream presigned URL TTL (s). Longer than the download TTL because
      # ``<video src=...>`` players issue multiple Range requests over the
      # full playback window — 120s would 403 mid-playback on any video > 2 min.
      # Default 30 min covers a typical workspace play / pause / scrub session.
      AVT_R2_STREAM_PRESIGNED_EXPIRES_S: "${AVT_R2_STREAM_PRESIGNED_EXPIRES_S:-1800}"
      # Lazy-upload wall clock budget (s). If the first-download upload
      # can't finish inside this, backend_router falls back to local.
      AVT_R2_UPLOAD_TIMEOUT_S: "${AVT_R2_UPLOAD_TIMEOUT_S:-60}"
      # --- Pan backup (plan 2026-05-14 Task 2.5) ---
      AVT_ENABLE_PAN_BACKUP: "${AVT_ENABLE_PAN_BACKUP:-false}"
      AVT_PAN_AUTO_ARCHIVE_ENABLED: "${AVT_PAN_AUTO_ARCHIVE_ENABLED:-false}"
      AVT_PAN_AUTO_ARCHIVE_DAYS: "${AVT_PAN_AUTO_ARCHIVE_DAYS:-30}"
      AVT_PAN_AUTO_ARCHIVE_HOUR_BJT: "${AVT_PAN_AUTO_ARCHIVE_HOUR_BJT:-3}"
      AVT_PAN_AUTO_ARCHIVE_MAX_PER_RUN: "${AVT_PAN_AUTO_ARCHIVE_MAX_PER_RUN:-5}"
      AVT_PAN_AUTO_ARCHIVE_DRY_RUN: "${AVT_PAN_AUTO_ARCHIVE_DRY_RUN:-true}"
      AVT_PAN_ORPHAN_CLEANUP_WEEKDAY: "${AVT_PAN_ORPHAN_CLEANUP_WEEKDAY:-5}"
      AVT_PAN_UPLOAD_CHUNK_BYTES: "${AVT_PAN_UPLOAD_CHUNK_BYTES:-4194304}"
      AVT_PAN_TASK_STALE_HOURS: "${AVT_PAN_TASK_STALE_HOURS:-4}"
      # 2026-05-26 postmortem P0b/P0c. Global serialization timeout +
      # tar staging dir off the container overlay.
      AVT_PAN_BACKUP_GLOBAL_LOCK_TIMEOUT_S: "${AVT_PAN_BACKUP_GLOBAL_LOCK_TIMEOUT_S:-14400}"
      AVT_PAN_TMP_DIR: "${AVT_PAN_TMP_DIR:-/opt/aivideotrans/data/_pan_tmp}"
      AVT_PAN_TMP_FREE_SPACE_RATIO: "${AVT_PAN_TMP_FREE_SPACE_RATIO:-1.5}"
      AVT_BAIDU_PAN_APPKEY: "${AVT_BAIDU_PAN_APPKEY:-}"
      AVT_BAIDU_PAN_APPSECRET: "${AVT_BAIDU_PAN_APPSECRET:-}"
      AVT_BAIDU_PAN_REDIRECT_URI: "${AVT_BAIDU_PAN_REDIRECT_URI:-}"
      AVT_PAN_TOKEN_ENCRYPTION_KEY: "${AVT_PAN_TOKEN_ENCRYPTION_KEY:-}"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8880/gateway/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  disk-resize-helper:
    image: aivideotrans-gateway:latest
    container_name: aivideotrans-disk-resize-helper
    network_mode: host
    restart: unless-stopped
    command: ["python", "disk_resize_helper.py"]
    env_file:
      - /opt/aivideotrans/config/.env
    environment:
      AVT_ADMIN_DISK_RESIZE_ENABLED: "${AVT_ADMIN_DISK_RESIZE_ENABLED:-false}"
      AVT_ADMIN_DISK_RESIZE_DEVICE: "${AVT_ADMIN_DISK_RESIZE_DEVICE:-/dev/null}"
      AVT_ADMIN_DISK_RESIZE_HELPER_HOST: "127.0.0.1"
      AVT_ADMIN_DISK_RESIZE_HELPER_PORT: "8891"
      AVT_ADMIN_DISK_RESIZE_HELPER_TOKEN: "${AVT_ADMIN_DISK_RESIZE_HELPER_TOKEN:-}"
    devices:
      # Keep the raw block device out of the main Gateway container. The helper
      # exposes only fixed-device status/resize endpoints on 127.0.0.1.
      - "${AVT_ADMIN_DISK_RESIZE_DEVICE:-/dev/null}:${AVT_ADMIN_DISK_RESIZE_DEVICE:-/dev/null}"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8891/health', timeout=3).read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Cloudflare Tunnel connector (Phase 1 — see
  # docs/plans/2026-04-21-cloudflare-r2-deployment-plan.md §4).
  # Registers outbound connections to Cloudflare edge, so public users
  # reach aitrans.video via Cloudflare's anycast network (unblocked in
  # China) instead of hitting the US source IP directly. After Step 14
  # Caddy downgrade, this is the ONLY public ingress path.
  # TUNNEL_TOKEN is issued per-tunnel by Cloudflare; anyone holding it
  # can impersonate the tunnel, so keep it in /opt/aivideotrans/config/.env.
  cloudflared-us:
    image: cloudflare/cloudflared:latest
    container_name: aivideotrans-cloudflared-us
    network_mode: host
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARED_TOKEN_US:?CLOUDFLARED_TOKEN_US 必须在 .env 中设置}
      # Phase 1.5 硬化（2026-04-22）：metrics 端口只 bind loopback。
      # 默认 *:20241 会在 ufw 失效时泄漏 tunnel 配置（/config endpoint
      # 能读到完整 ingress rule）。cloudflared 官方 env var，优先级 >
      # --metrics CLI flag。
      - TUNNEL_METRICS=127.0.0.1:20241
    # Start after core services so first tunnel registration has a
    # functioning origin. No service_healthy dependency — tunnel should
    # register even if origin is briefly down (Cloudflare returns 502 to
    # clients while connector stays connected).
    depends_on:
      - gateway
      - next
      - caddy

  caddy:
    image: ${CADDY_IMAGE_NAME:-caddy:2.9.1}
    container_name: ${CADDY_CONTAINER_NAME:-aivideotrans-caddy}
    network_mode: host
    restart: unless-stopped
    depends_on:
      gateway:
        condition: service_healthy
    env_file:
      - ${AIVIDEOTRANS_ROOT}/config/.env
    volumes:
      - type: bind
        source: ${AIVIDEOTRANS_ROOT}/caddy/Caddyfile
        target: /etc/caddy/Caddyfile
        read_only: true
      - type: bind
        source: ${AIVIDEOTRANS_ROOT}/caddy/data
        target: /data
      - type: bind
        source: ${AIVIDEOTRANS_ROOT}/caddy/config
        target: /config
      - type: bind
        source: ${AIVIDEOTRANS_ROOT}/data/runtime_logs
        target: /var/log/aivideotrans
      # Phase 0 探针样本目录（只读）：Caddyfile 里 handle_path /probe/* →
      # file_server 会从 /srv/probe 读 100MB 随机样本。探针完成后可删除。
      - type: bind
        source: ${AIVIDEOTRANS_ROOT}/probe_samples
        target: /srv/probe
        read_only: true
    healthcheck:
      test: ["CMD", "caddy", "validate", "--config", "/etc/caddy/Caddyfile", "--adapter", "caddyfile"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  pgdata:
