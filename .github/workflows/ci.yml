name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -r requirements-dev.txt
      - name: Run backend guard tests
        run: >
          pytest -q
          tests/test_gateway_startup_checks.py
          tests/test_phase1_guards.py
          tests/test_legacy_cleanup_guards.py
      - name: Run P0 remediation tests
        run: >
          pytest -q
          tests/test_metering_payload_builder.py
          tests/test_process_pipeline.py::test_report_job_metering_sends_internal_key
          tests/test_job_metering_writeback.py::TestReportJobMeteringCallback
          tests/test_user_voice_internal_access.py
          tests/test_gateway_lazy_init_smoke.py::test_alembic_env_registers_sibling_model_tables
          tests/test_p0_8_split_audio_sync.py
          tests/test_gateway_editing_commit_sync.py::test_consume_post_edit_tts_usage_records_trial_allowance
          tests/test_gateway_editing_commit_sync.py::test_consume_post_edit_tts_usage_accumulates_existing_usage
          tests/test_gateway_editing_commit_sync.py::test_consume_post_edit_tts_usage_rejects_segment_limit_without_increment
          tests/test_gateway_editing_commit_sync.py::test_consume_post_edit_tts_usage_rejects_char_limit_without_increment
          tests/test_gateway_editing_commit_sync.py::test_consume_post_edit_tts_usage_accepts_paid_plan_limits
          tests/test_aligner_concurrency.py::test_align_all_parallel_first_error_sets_stop_event_and_skips_paid_fallback
          tests/test_aligner_concurrency.py::test_align_all_parallel_base_exception_sets_stop_event_and_reraises

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend-next
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend-next/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npx tsc --noEmit
