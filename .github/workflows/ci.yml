name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -r requirements-dev.txt
      - run: python -m pip install -r gateway/requirements.txt
      - name: Run backend guard tests
        run: >
          pytest -q
          tests/test_gateway_startup_checks.py
          tests/test_phase1_guards.py
          tests/test_legacy_cleanup_guards.py
      - name: Run P0 remediation tests
        run: >
          pytest -q
          tests/test_metering_payload_builder.py
          tests/test_process_pipeline.py::test_report_job_metering_sends_internal_key
          tests/test_job_metering_writeback.py::TestReportJobMeteringCallback
          tests/test_user_voice_internal_access.py
          tests/test_gateway_lazy_init_smoke.py::test_alembic_env_registers_sibling_model_tables
          tests/test_p0_8_split_audio_sync.py
          tests/test_gateway_editing_commit_sync.py::test_consume_post_edit_tts_usage_records_trial_allowance
          tests/test_gateway_editing_commit_sync.py::test_consume_post_edit_tts_usage_accumulates_existing_usage
          tests/test_gateway_editing_commit_sync.py::test_consume_post_edit_tts_usage_rejects_segment_limit_without_increment
          tests/test_gateway_editing_commit_sync.py::test_consume_post_edit_tts_usage_rejects_char_limit_without_increment
          tests/test_gateway_editing_commit_sync.py::test_consume_post_edit_tts_usage_accepts_paid_plan_limits
          tests/test_aligner_concurrency.py::test_align_all_parallel_first_error_sets_stop_event_and_skips_paid_fallback
          tests/test_aligner_concurrency.py::test_align_all_parallel_base_exception_sets_stop_event_and_reraises

  # Phase 4.3a/4.3b PG 并发原子性需要真 PostgreSQL（FOR UPDATE [SKIP LOCKED]
  # 阻塞语义，sqlite 测不了）。独立 job 起 postgres service，只跑 PG integration
  # 文件（PR2 reservation atomic + 4.3b voice-cleanup claim 并发）；不影响上面的
  # backend job（仍纯 pytest 无 PG 依赖）。
  backend-pg-integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: avt
          POSTGRES_PASSWORD: avt_test
          POSTGRES_DB: aivideotrans_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -r requirements-dev.txt
      - run: python -m pip install -r gateway/requirements.txt
      - name: Run PG concurrency integration tests
        env:
          AVT_TEST_PG_DSN: postgresql+asyncpg://avt:avt_test@localhost:5432/aivideotrans_test
        run: >
          pytest -q
          tests/test_phase43a_pr2_reservation_pg_atomic.py
          tests/test_phase43b_voice_cleanup_pg_concurrent.py

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend-next
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend-next/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npx tsc --noEmit

  # ---------------------------------------------------------------------------
  # TU-03 质量护栏脚手架（2026-06-25）。首周一律不把历史 lint/type 债或全量
  # 测试失败变成 PR 硬门：ruff 仅对「改动文件」阻断、mypy 与 full-suite 均
  # report-only / continue-on-error。见
  # docs/plans/code-quality-tasks/TU-03-quality-scaffold.md。
  # ---------------------------------------------------------------------------
  python-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # 三点 diff 需要 merge-base；浅克隆会让 origin/$BASE...HEAD 失效。
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install ruff mypy pydantic pydantic-settings
      - name: Ruff — 改动文件阻断 + 全仓 report-only
        run: |
          BASE="${{ github.base_ref }}"
          FILES=""
          if [ -n "$BASE" ]; then
            git fetch origin "$BASE" || true
            # --diff-filter=ACMR：只取 Added/Copied/Modified/Renamed（去掉 Deleted），
            # 否则被删 .py 的路径会进 $FILES，ruff 对不存在的文件 E902 退出 → 误阻断纯删除 PR。
            FILES=$(git diff --name-only --diff-filter=ACMR "origin/$BASE...HEAD" -- '*.py' | tr '\n' ' ')
          fi
          if [ -n "${FILES// /}" ]; then
            echo "Changed .py files: $FILES"
            ruff check $FILES --output-format=github
            ruff format --check $FILES
          else
            echo "No changed .py files — changed-files ruff gate is a no-op."
          fi
          echo "::group::Full-repo ruff (report-only, never blocks)"
          ruff check src/ gateway/ --exit-zero --output-format=github
          echo "::endgroup::"
      - name: Mypy — 窄域（首周 report-only，不阻断）
        # 窄域模块当前仍有历史 type 债（debt baseline 记于 PR）；清理交 TU-07，
        # 禁止批量 `# type: ignore` 换绿。稳定后删除本行转硬门。
        continue-on-error: true
        run: mypy src/core/ src/utils/ src/services/llm/ gateway/storage/ --ignore-missing-imports --check-untyped-defs

  # 首周 report-only：continue-on-error 不阻断 PR。跑出稳定 baseline 后删除本行
  # 并把 --cov-fail-under 设为实测值，逐季棘轮。别第一周就把「全量 + 覆盖率」做成
  # PR 硬门。排除 real_provider（红线：CI 永不触发真实付费外部调用）/ benchmark
  # （非 pass/fail）/ postgres（由独立 backend-pg-integration job 覆盖）/ slow。
  backend-full-suite:
    runs-on: ubuntu-latest
    continue-on-error: true        # ← 首周不阻断；稳定后删除本行转为硬门
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -r requirements-dev.txt -r gateway/requirements.txt pytest-cov pytest-timeout pytest-xdist
      - name: Full suite — 超时守护 + 分片 + 覆盖率（仅收集，不设硬门）
        run: >
          pytest -q -n auto --timeout=120 --timeout-method=thread
          --ignore=tests/test_phase43a_pr2_reservation_pg_atomic.py
          --ignore=tests/test_phase43b_voice_cleanup_pg_concurrent.py
          -m "not real_provider and not benchmark and not postgres and not slow"
          --cov=src --cov=gateway --cov-report=term-missing

  file-size-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: File-size ratchet (新文件 ≤800；白名单文件不许超过基线行数)
        run: |
          # 防同一 PR 同时撑大文件并抬高其基线 cap（自我授权绕过）：优先用 base ref 的基线
          # 衡量当前行数。base ref 没有该文件（如本 PR 首次引入基线）或非 PR 事件 → 回退到
          # 当前 checkout 的基线（fail-open 到本地基线，避免基础设施抖动误阻断）。
          BASE="${{ github.base_ref }}"
          BASELINE_FILE=tools/file_size_baseline.json
          if [ -n "$BASE" ]; then
            git fetch origin "$BASE" --depth=1 || true
            if git show "origin/$BASE:tools/file_size_baseline.json" > /tmp/base_baseline.json 2>/dev/null; then
              BASELINE_FILE=/tmp/base_baseline.json
            fi
          fi
          echo "Using baseline: $BASELINE_FILE"
          BASELINE_FILE="$BASELINE_FILE" python - <<'PY'
          import json, os, pathlib, sys
          BASELINE = json.load(open(os.environ["BASELINE_FILE"], encoding="utf-8"))
          targets = list(pathlib.Path("src").rglob("*.py")) + list(pathlib.Path("gateway").rglob("*.py")) + [pathlib.Path("main.py")]
          viol = []
          for p in targets:
              rel = str(p).replace("\\", "/")
              n = sum(1 for _ in open(p, encoding="utf-8", errors="ignore"))
              cap = BASELINE.get(rel, 800)   # 白名单文件=其基线行数；其余=800 上限
              if n > cap:
                  viol.append((rel, n, cap))
          if viol:
              print("File exceeds size budget (new file >800, or whitelisted file grew past base-branch baseline):")
              for f, n, cap in viol:
                  print(f"  {f}: {n} > {cap}")
              sys.exit(1)
          print("file-size ratchet OK")
          PY
